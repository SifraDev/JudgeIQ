kind = "web"
previewPath = "/"
title = "JudgeIQ"
version = "1.0.0"
id = "artifacts/judge-iq"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22004

[services.development]
run = "pnpm --filter @workspace/judge-iq run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/judge-iq", "run", "build" ]
publicDir = "artifacts/judge-iq/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22004"
BASE_PATH = "/"
